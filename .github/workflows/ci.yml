name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsecret-1-dev
        
    - name: Install dependencies
      run: npm ci
      
    - name: Rebuild keytar (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: npm rebuild keytar

    - name: Syntax check
      run: |
        node --check index.js
        node --check vault-resolver.js
        node --check playwright-client.js
